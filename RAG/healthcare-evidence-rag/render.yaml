services:
  - type: web
    name: healthcare-evidence-rag
    env: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: INDEX_DIR
        value: data/index
      - key: DOCS_DIR
        value: data/docs
      - key: MLFLOW_TRACKING_URI
        value: ./mlruns
      - key: EXPERIMENT_NAME
        value: healthcare-evidence-rag